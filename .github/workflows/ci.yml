name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + typecheck + unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (cpu + dev)
        run: |
          python -m pip install --upgrade pip
          # CPU torch + ultralytics are heavy on CI runners; keep this here
          # rather than in the dev extras so contributors aren't forced into a
          # multi-GB install for typing-only PRs.
          python -m pip install -e ".[cpu,dev]"

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Unit tests
        run: make test

      - name: Coverage report
        run: make cov

  docker:
    name: docker buildx smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          build-args: |
            BASE=cpu
          push: false
          tags: playercount:ci-cpu
